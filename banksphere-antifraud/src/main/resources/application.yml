# =============================================================================
#     BANKSphere AntiFraud Service - CONFIGURACIÓN DE PROPIEDADES (YAML)
# =============================================================================

server:
  port: 8082

spring:
  application:
    name: banksphere-antifraud

  # 1. Configuración de Conexión a la Base de Datos PostgreSQL (Compartida o dedicada)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banksphere_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:secretpassword}
    driver-class-name: org.postgresql.Driver

  # 2. Configuración de JPA & Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  # 3. Configuración de Conexión al Message Broker de RabbitMQ
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    listener:
      simple:
        concurrency: 1
        max-concurrency: 3
        acknowledge-mode: auto

# 4. Configuración de Niveles de Logs
logging:
  level:
    root: INFO
    org.springframework.amqp: INFO
    com.banksphere.antifraud: DEBUG