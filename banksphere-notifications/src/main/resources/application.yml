# =============================================================================
#     BANKSphere Notifications - CONFIGURACIÓN DE PROPIEDADES (YAML)
# =============================================================================

server:
  port: 8083  # Puerto único de escucha para la conexión de WebSockets

spring:
  application:
    name: banksphere-notifications

  # 1. Configuración de Conexión al Message Broker de RabbitMQ
  rabbitmq:
    host: localhost   # Cambiar a 'rabbitmq' al empaquetar con docker-compose
    port: 5672
    username: guest
    password: guest

  # 2. Configuración de Spring Mail (SMTP Sandbox - Mailpit)
  mail:
    host: localhost   # Cambiar a 'mailpit' al empaquetar con docker-compose
    port: 1025        # Puerto SMTP sin autenticación de Mailpit
    properties:
      mail:
        smtp:
          auth: false
          connectiontimeout: 5000 # Tiempo máximo de espera para establecer conexión (5 segundos)
          timeout: 5000           # Tiempo máximo de lectura
          write-timeout: 5000
          starttls:
            enable: false         # Desactivamos cifrado TLS requerido para servidores reales (Gmail/Outlook)


# 3. Configuración de Logs
logging:
  level:
    root: INFO
    org.springframework.amqp: INFO
    com.banksphere.notifications: DEBUG # Monitorea el envío de mails y empujes de WebSockets