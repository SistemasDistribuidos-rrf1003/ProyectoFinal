# =============================================================================
#     BANKSphere Notifications - CONFIGURACIÓN DE PROPIEDADES (YAML)
# =============================================================================

server:
  port: 8083

spring:
  application:
    name: banksphere-notifications

  # 1. Configuración de Conexión al Message Broker de RabbitMQ
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

  # 2. Configuración de Spring Mail (SMTP Sandbox - Mailpit)
  mail:
    host: ${MAIL_HOST:localhost}
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          connectiontimeout: 5000
          timeout: 5000
          write-timeout: 5000
          starttls:
            enable: false

# 3. Configuración de Logs
logging:
  level:
    root: INFO
    org.springframework.amqp: INFO
    com.banksphere.notifications: DEBUG