# =============================================================================
#     CONFIGURACIÓN DE TIEMPO DE PRUEBAS (H2 IN-MEMORY TEST DATABASE)
# =============================================================================
spring:
  datasource:
    url: jdbc:h2:mem:banksphere_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # Crea el esquema al iniciar el test y lo destruye al finalizar
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  # Configuramos RabbitMQ en modo mock/test para evitar fallos de conexión
  rabbitmq:
    listener:
      simple:
        auto-startup: false # Evita que intente conectarse de forma real al levantar el contexto