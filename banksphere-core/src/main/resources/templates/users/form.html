<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Editar Usuario - BankSphere' : 'Nuevo Usuario - BankSphere'">Mantenimiento de Usuario</title>

    <!-- Google Fonts & Bootstrap 5 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script th:src="@{/js/theme-manager.js}"></script>


</head>
<body>

<div class="app-layout">
    <!-- Sidebar Navigation -->
    <!-- INVOCACIÓN LIMPIA Y MODULAR DE LA SIDEBAR FRAGMENT -->
    <aside th:replace="~{fragments/sidebar :: sidebar('users')}"></aside>

    <!-- Main Content Area -->
    <main class="main-content">

        <!-- Breadcrumbs / Header -->
        <div class="mb-4 d-flex align-items-center gap-2 text-muted small">
            <a href="/users" class="text-decoration-none text-muted hover-white">Clientes</a>
            <i class="bi bi-chevron-right"></i>
            <span class="text-white" th:text="${isEdit} ? 'Editar Perfil' : 'Nuevo Cliente'">Nuevo</span>
        </div>

        <div class="glass-card">
            <!-- Título e Icono Dinámicos -->
            <div class="mb-4">
                <h2 class="font-family-outfit fw-bold mb-1" th:text="${isEdit} ? 'Editar Usuario' : 'Registrar Nuevo Usuario'">Nuevo Usuario</h2>
                <p class="text-muted small" th:text="${isEdit} ? 'Modifica los privilegios o datos del cliente. Los cambios impactarán sus cuentas asociadas.' : 'Crea una nueva identidad bancaria con encriptación BCrypt e KYC inicial.'">Detalles del formulario</p>
            </div>

            <!-- Mensaje de Error Global -->
            <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-3 p-3 mb-4" role="alert" style="background: rgba(239, 68, 68, 0.15); color: #f87171;">
                <i class="bi bi-exclamation-octagon-fill me-2"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- Formulario Thymeleaf Enlazado al Objeto User -->
            <form th:action="${isEdit} ? @{/users/edit/{id}(id=${user.id})} : @{/users/new}" th:object="${user}" method="POST">

                <!-- Fila 1: Nombre y Apellidos -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">Nombre</label>
                        <div class="input-group-custom">
                            <i class="bi bi-person"></i>
                            <input type="text" id="firstName" th:field="*{firstName}" class="form-control-custom" placeholder="Javier" required>
                        </div>
                        <span class="error-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">Error de nombre</span>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Apellidos</label>
                        <div class="input-group-custom">
                            <i class="bi bi-people"></i>
                            <input type="text" id="lastName" th:field="*{lastName}" class="form-control-custom" placeholder="Gómez Ruiz" required>
                        </div>
                        <span class="error-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">Error de apellidos</span>
                    </div>
                </div>

                <!-- Fila 2: Email y Teléfono -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email de Acceso</label>
                        <div class="input-group-custom">
                            <i class="bi bi-envelope"></i>
                            <input type="email" id="email" th:field="*{email}" class="form-control-custom" placeholder="javier.gomez@gmail.com" required>
                        </div>
                        <span class="error-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error de email</span>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Teléfono Móvil</label>
                        <div class="input-group-custom">
                            <i class="bi bi-telephone"></i>
                            <input type="tel" id="phone" th:field="*{phone}" class="form-control-custom" placeholder="+34 611 223 344">
                        </div>
                        <span class="error-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Error de teléfono</span>
                    </div>
                </div>

                <!-- Fila 3: DNI / Documento y Rol del Usuario -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="nationalId" class="form-label">Documento Identidad (DNI/NIE)</label>
                        <!-- El documento de identidad no se permite editar una vez creado por normativas KYC/AML -->
                        <div class="input-group-custom">
                            <i class="bi bi-card-text"></i>
                            <input type="text" id="nationalId" th:field="*{nationalId}" class="form-control-custom" placeholder="87654321B" required th:readonly="${isEdit}">
                        </div>
                        <span class="error-feedback" th:if="${#fields.hasErrors('nationalId')}" th:errors="*{nationalId}">Error de documento</span>
                    </div>
                    <div class="col-md-6">
                        <label for="role" class="form-label">Rol del Usuario (Privilegios)</label>
                        <div class="input-group-custom">
                            <i class="bi bi-shield-fill"></i>
                            <select id="role" th:field="*{role}" class="form-select-custom" required>
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">USER</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Fila 4: Contraseña y Estado -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="password" class="form-label">Contraseña</label>
                        <div class="input-group-custom">
                            <i class="bi bi-lock-fill"></i>
                            <!-- Si estamos editando, la contraseña no es obligatoria para preservarla -->
                            <input type="password" id="password" th:field="*{password}" class="form-control-custom" placeholder="••••••••••••" th:required="${!isEdit}">
                        </div>
                        <small class="text-muted d-block mt-1 ps-2" th:if="${isEdit}">Dejar en blanco si no deseas modificarla.</small>
                        <span class="error-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error de clave</span>
                    </div>
                    <div class="col-md-6">
                        <label for="status" class="form-label">Estado de la Cuenta</label>
                        <div class="input-group-custom">
                            <i class="bi bi-activity"></i>
                            <select id="status" th:field="*{status}" class="form-select-custom" required>
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">ACTIVE</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Acciones Finales -->
                <div class="d-flex justify-content-end gap-3 pt-3 border-top" style="border-color: var(--border-color) !important;">
                    <a href="/users" class="btn btn-cancel">Cancelar</a>
                    <button type="submit" class="btn-submit" th:text="${isEdit} ? 'Salvar Cambios' : 'Registrar Cliente'">Registrar Cliente</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
