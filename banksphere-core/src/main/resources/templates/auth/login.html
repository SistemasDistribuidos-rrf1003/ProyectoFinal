<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BankSphere</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Accede de forma segura a BankSphere, tu plataforma bancaria inteligente de nueva generación.">

    <!-- Google Fonts & Bootstrap 5 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<!-- Glows de ambientación -->
<div class="glow-bg glow-1"></div>
<div class="glow-bg glow-2"></div>

<div class="auth-container">
    <div class="auth-card">
        <!-- Encabezado / Logo -->
        <div class="text-center mb-4">
            <div class="brand-title mb-2">
                <i class="bi bi-globe2"></i> BankSphere
            </div>
            <p class="text-muted small">Tu pasarela financiera inteligente y segura</p>
        </div>

        <!-- Alerta: Error de credenciales -->
        <div th:if="${param.error}" class="alert alert-custom alert-custom-danger mb-4" role="alert" id="error-alert">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <div>Email o contraseña incorrectos.</div>
        </div>

        <!-- Alerta: Cierre de sesión exitoso -->
        <div th:if="${param.logout}" class="alert alert-custom alert-custom-success mb-4" role="alert" id="logout-alert">
            <i class="bi bi-check-circle-fill fs-5"></i>
            <div>Sesión cerrada correctamente.</div>
        </div>

        <!-- Formulario seguro -->
        <form th:action="@{/login}" method="POST">

            <!-- Entrada: Correo electrónico -->
            <div class="mb-3">
                <label for="username" class="form-label">Email Corporativo / Personal</label>
                <div class="input-group-custom">
                    <i class="bi bi-envelope-fill"></i>
                    <input type="email" id="username" name="username" class="form-control-custom" placeholder="ejemplo@banksphere.com" required autofocus autocomplete="email">
                </div>
            </div>

            <!-- Entrada: Contraseña -->
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label for="password" class="form-label mb-0">Contraseña de Acceso</label>
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input type="password" id="password" name="password" class="form-control-custom" placeholder="••••••••••••" required autocomplete="current-password">
                </div>
            </div>

            <!-- Botón Enviar -->
            <div class="d-grid mb-4">
                <button type="submit" class="btn-submit" id="btn-login">
                    Ingresar a la Plataforma <i class="bi bi-arrow-right-short fs-5 align-middle"></i>
                </button>
            </div>

            <!-- Registro -->
            <div class="text-center">
                <span class="text-muted small">¿Nuevo en BankSphere?</span>
                <a th:href="@{/register}" class="register-link small ms-1">Crear una cuenta</a>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS (opcional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
