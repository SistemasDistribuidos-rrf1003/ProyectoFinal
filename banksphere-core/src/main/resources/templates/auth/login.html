<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BankSphere</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Accede de forma segura a BankSphere, tu plataforma bancaria inteligente de nueva generación.">

    <!-- Google Fonts & Bootstrap 5 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Estilos de Alta Estética (Tema Oscuro & Glassmorphism) -->
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(25, 28, 41, 0.65);
            --primary-grad: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --accent-grad: linear-gradient(135deg, #b15cff 0%, #5c53ff 100%);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(17, 24, 39, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Efectos de luces de fondo (Glows) */
        .glow-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 0;
            filter: blur(40px);
        }
        .glow-1 { top: -10%; left: -10%; }
        .glow-2 { bottom: -10%; right: -10%; }

        .auth-container {
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 15px;
        }

        /* Tarjeta de cristal esmerilado (Glassmorphism) */
        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-card:hover {
            box-shadow: 0 25px 50px rgba(79, 172, 254, 0.1);
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-custom {
            position: relative;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .input-group-custom:focus-within {
            border-color: #00f2fe;
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.15);
        }

        .input-group-custom i {
            padding: 15px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-control-custom {
            background: transparent !important;
            border: none !important;
            color: var(--text-color) !important;
            padding: 14px 15px 14px 0px;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
        }

        .form-control-custom::placeholder {
            color: #4b5563;
        }

        /* Botón animado con gradiente brillante */
        .btn-submit {
            background: var(--primary-grad);
            border: none;
            color: #0b0c10;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .alert-custom {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .alert-custom-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .alert-custom-success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.2);
        }

        .register-link {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .register-link:hover {
            color: #4facfe;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Glows de ambientación -->
<div class="glow-bg glow-1"></div>
<div class="glow-bg glow-2"></div>

<div class="auth-container">
    <div class="auth-card">
        <!-- Encabezado / Logo -->
        <div class="text-center mb-4">
            <div class="brand-title mb-2">
                <i class="bi bi-globe2"></i> BankSphere
            </div>
            <p class="text-muted small">Tu pasarela financiera inteligente y segura</p>
        </div>

        <!-- Alerta: Error de credenciales -->
        <div th:if="${param.error}" class="alert alert-custom alert-custom-danger mb-4" role="alert" id="error-alert">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <div>Email o contraseña incorrectos.</div>
        </div>

        <!-- Alerta: Cierre de sesión exitoso -->
        <div th:if="${param.logout}" class="alert alert-custom alert-custom-success mb-4" role="alert" id="logout-alert">
            <i class="bi bi-check-circle-fill fs-5"></i>
            <div>Sesión cerrada correctamente.</div>
        </div>

        <!-- Formulario seguro -->
        <form th:action="@{/login}" method="POST">

            <!-- Entrada: Correo electrónico -->
            <div class="mb-3">
                <label for="username" class="form-label">Email Corporativo / Personal</label>
                <div class="input-group-custom">
                    <i class="bi bi-envelope-fill"></i>
                    <input type="email" id="username" name="username" class="form-control-custom" placeholder="ejemplo@banksphere.com" required autofocus autocomplete="email">
                </div>
            </div>

            <!-- Entrada: Contraseña -->
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label for="password" class="form-label mb-0">Contraseña de Acceso</label>
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input type="password" id="password" name="password" class="form-control-custom" placeholder="••••••••••••" required autocomplete="current-password">
                </div>
            </div>

            <!-- Botón Enviar -->
            <div class="d-grid mb-4">
                <button type="submit" class="btn-submit" id="btn-login">
                    Ingresar a la Plataforma <i class="bi bi-arrow-right-short fs-5 align-middle"></i>
                </button>
            </div>

            <!-- Registro -->
            <div class="text-center">
                <span class="text-muted small">¿Nuevo en BankSphere?</span>
                <a th:href="@{/register}" class="register-link small ms-1">Crear una cuenta</a>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS (opcional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
